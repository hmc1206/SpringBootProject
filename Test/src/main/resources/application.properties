spring.application.name=Test

server.port=8081

spring.datasource.driver-class-name=org.mariadb.jdbc.Driver
# 'your_db_name' 자리에 본인이 만든 데이터베이스 이름을 넣으세요.
spring.datasource.url=jdbc:mariadb://localhost:3306/bootex?allowPublicKeyRetrieval=true&useSSL=false

spring.datasource.username=bootuser
spring.datasource.password=hmc041206


# (선택) JPA 사용 시 MariaDB 방언 설정
spring.jpa.database-platform=org.hibernate.dialect.MariaDBDialect
#프로젝트 실행시에 자동으로 DDL을 생성할 것인지를 결정하는 설정
spring.jpa.hibernate.ddl-auto=create
#실제 JPA의 구현체인 Hibernate가 동작하면서 발생하는 SQL을 포맷팅해서 출력
spring.jpa.properties.hibernate.format_sql=true
#JPA 처리 시에 발생하는 SQL을 보여줄 것인지 결정
spring.jpa.show-sql=true

#thymeleaf를 이용하는 프로젝트는 변경 후에 만들어진 결과를 보관(캐싱)하지 않도록 설정해 두는 것이 편리함
spring.thymeleaf.cache = false
