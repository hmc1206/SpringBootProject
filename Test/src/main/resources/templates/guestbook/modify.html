<!DOCTYPE html>
<html lang="en">

<th:block th:replace="~{/layout/basic :: setContent(~{this ::content} )}">
  <th:block th:fragment="content">
    <h1 class="mt-4">GuestBook Modify Page</h1>

    <form action="/guestbook/modify" method="post"> //추가된 form 태그
      <div class="form-group">
        <label>Gno</label>
        <input type="text" class="form-control" name="gno" th:value="${dto.gno}" readonly>
      </div>

      <div class="form-group">
        <label>Title</label>
        <input type="text" class="form-control" name="title" th:value="${dto.title}" readonly>
      </div>
      <div class="form-group">
        <label>Content</label>
        <textarea class="form-control" name="content" rows="5" readonly>[[${dto.content}]]</textarea>
      </div>
      <div class="form-group">
        <label>Writer</label>
        <input type="text" class="form-control" name="writer" th:value="${dto.writer}" readonly>
      </div>

      <!--날짜 부분은 화면에서 수정 자체도 불가능하고 JPA에서 자동으로 처리될 것이므로, name속성 없이 작성-->
      <div class="form-group">
        <label>RegDate</label>
        <input type="text" class="form-control" th:value="${#temporals.format(dto.regDate, 'yyyy/MM/dd HH:mm:ss')}" readonly>
      </div>
      <div class="form-group">
        <label>ModDate</label>
        <input type="text" class="form-control" th:value="${#temporals.format(dto.modDate, 'yyyy/MM/dd HH:mm:ss')}" readonly>
      </div>
    </form>

    <!-- 화면에 기능을 처리할 때 사용하는 버튼들 추가 -->
    <button type="button" class="btn btn-primary">Modify</button>
    <button type="button" class="btn btn-info">List</button>
    <button type="button" class="btn btn-danger removeBtn">Remove</button>
  </th:block>
  <script th:inline = "javascript">
    var actionForm = $("form");
    $(".removeBtn").click(function () {
      actionForm
              .attr("action", "/guestbook/remove")
              .attr("method", "post");

      actionForm.submit();
    })
  </script>
</th:block>
