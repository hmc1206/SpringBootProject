<!DOCTYPE html>
<html lang="en">

<th:block th:replace="~{/layout/basic :: setContent(~{this ::content} )}">
  <th:block th:fragment="content">
    <h1 class="mt-4">GuestBook Modify Page</h1>

    <!--추가된 form 태그-->
    <form action="/guestbook/modify" method="post">
      <!-- 페이지 번호 -->
      <input type="hidden" name="page" th:value="${requestDTO.page}">
      <div class="form-group">
        <label>Gno</label>
        <input type="text" class="form-control" name="gno" th:value="${dto.gno}" readonly>
      </div>

      <div class="form-group">
        <label>Title</label>
        <input type="text" class="form-control" name="title" th:value="${dto.title}">
      </div>
      <div class="form-group">
        <label>Content</label>
        <textarea class="form-control" name="content" rows="5">[[${dto.content}]]</textarea>
      </div>
      <div class="form-group">
        <label>Writer</label>
        <input type="text" class="form-control" name="writer" th:value="${dto.writer}" readonly>
      </div>

      <!--날짜 부분은 화면에서 수정 자체도 불가능하고 JPA에서 자동으로 처리될 것이므로, name속성 없이 작성-->
      <div class="form-group">
        <label>RegDate</label>
        <input type="text" class="form-control" th:value="${#temporals.format(dto.regDate, 'yyyy/MM/dd HH:mm:ss')}" readonly>
      </div>
      <div class="form-group">
        <label>ModDate</label>
        <input type="text" class="form-control" th:value="${#temporals.format(dto.modDate, 'yyyy/MM/dd HH:mm:ss')}" readonly>
      </div>
    </form>

    <!-- 화면에 기능을 처리할 때 사용하는 버튼들 추가 -->
    <div class="mt-4">
      <button type="button" class="btn btn-primary modifyBtn">Modify</button>
      <button type="button" class="btn btn-info listBtn">List</button>
      <button type="button" class="btn btn-danger removeBtn">Remove</button>
    </div>

    <!-- 1. 올바른 jQuery CDN 주소로 수정 (fragment 내부에 위치) -->
    <script src="https://jquery.com"></script>

    <!-- 2. 기능 스크립트 -->
    <script th:inline="javascript">
      var actionForm = $("form");

      // 삭제 기능
      $(".removeBtn").click(function () {
        if(!confirm("삭제하시겠습니까?")){
          return;
        }
        actionForm
                .attr("action", "/guestbook/remove")
                .attr("method", "post")
                .submit();
      });

      // 수정 기능
      $(".modifyBtn").click(function() {
        if(!confirm("수정하시겠습니까?")){
          return;
        }
        actionForm
                .attr("action", "/guestbook/modify")
                .attr("method","post")
                .submit();
      });

      // 목록 기능 (수정 내용 전송 방지를 위해 입력칸을 비우고 page만 챙겨서 GET 전송)
      $(".listBtn").click(function() {
        var pageInfo = $("input[name='page']");
        actionForm.empty(); //form 태그의 모든 내용을 지우고
        actionForm.append(pageInfo); //목록 페이지 이동에 필요한 내용을 다시 추가
        actionForm
                .attr("action", "/guestbook/list")
                .attr("method", "get")
                .submit();
      });
    </script>
  </th:block> <!-- th:fragment="content"의 끝 -->
</th:block>
